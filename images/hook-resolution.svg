<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="290" viewBox="0 0 780 290" fill="none">
<rect width="780" height="290" rx="8" fill="#F9F9F7"/>


<text x="390" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9E9E9E">Example: how a PreToolUse hook resolves when Claude runs a Bash command</text>




<rect x="20" y="50" width="150" height="50" rx="6" fill="#E8E8E4"/>
<text x="95" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9E9E9E">Claude runs</text>
<text x="95" y="87" text-anchor="middle" font-family="monospace" font-size="9" font-weight="600" fill="#1E1E1E">Bash "rm -rf /tmp/build"</text>


<path d="M170 75 L195 75" stroke="#757575" stroke-width="2"/>
<polygon points="193,70 205,75 193,80" fill="#757575"/>


<rect x="205" y="45" width="155" height="60" rx="6" fill="#FDF6F2" stroke="#D4A27F" stroke-width="1.5"/>
<text x="282" y="63" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D4A27F">PreToolUse fires</text>
<text x="282" y="79" text-anchor="middle" font-family="monospace" font-size="9" fill="#757575">tool_name: "Bash"</text>
<text x="282" y="93" text-anchor="middle" font-family="monospace" font-size="9" fill="#757575">command: "rm -rf /tmp/build"</text>


<path d="M360 75 L385 75" stroke="#757575" stroke-width="2"/>
<polygon points="383,70 395,75 383,80" fill="#757575"/>


<rect x="395" y="50" width="120" height="50" rx="6" fill="#D4E4D8"/>
<text x="455" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9E9E9E">your matcher</text>
<text x="455" y="87" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#1E1E1E">"Bash" match?</text>


<path d="M515 65 L545 65" stroke="#4A8C5C" stroke-width="2"/>
<polygon points="543,60 555,65 543,70" fill="#4A8C5C"/>
<text x="530" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#4A8C5C">yes</text>


<rect x="555" y="50" width="140" height="50" rx="6" fill="#D4E4D8"/>
<text x="625" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9E9E9E">your hook command</text>
<text x="625" y="85" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#1E1E1E">block-rm.sh</text>




<path d="M625 100 L625 140" stroke="#757575" stroke-width="2"/>
<polygon points="620,138 625,150 630,138" fill="#757575"/>


<rect x="555" y="150" width="200" height="45" rx="6" fill="#FDF6F2" stroke="#D4A27F" stroke-width="1.5"/>
<text x="655" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D4A27F">blocked</text>
<text x="655" y="185" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#1E1E1E">{"decision": "block"}</text>


<path d="M455 100 L455 140" stroke="#B0B0B0" stroke-width="1.5" stroke-dasharray="5 3"/>
<polygon points="450,138 455,150 460,138" fill="#B0B0B0"/>
<text x="468" y="125" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B0B0B0">no</text>


<rect x="395" y="150" width="120" height="45" rx="6" fill="#D4E4D8"/>
<text x="455" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9E9E9E">no hooks matched</text>
<text x="455" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1E1E1E">tool proceeds</text>




<rect x="20" y="215" width="150" height="50" rx="6" fill="#E8E8E4"/>
<text x="95" y="244" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1E1E1E">Claude Code continues</text>


<path d="M655 195 L655 230 L175 230" stroke="#D4A27F" stroke-width="2"/>
<polygon points="177,225 165,230 177,235" fill="#D4A27F"/>
<text x="415" y="224" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D4A27F">tool call blocked</text>


<path d="M455 195 L455 250 L175 250" fill="none" stroke="#4A8C5C" stroke-width="1.5" stroke-dasharray="5 3"/>
<polygon points="177,245 165,250 177,255" fill="#4A8C5C"/>
<text x="315" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4A8C5C">tool call allowed</text>

</svg>